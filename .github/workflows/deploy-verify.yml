# Verify Heroku auto-deploy after CI passes on main.
# Fails loudly if production does not receive the commit (catches silent deploy gaps).
name: Verify Heroku Deploy

on:
  workflow_run:
    workflows: [Phase 1 Backend CI]
    types: [completed]
    branches: [main, master]

env:
  HEROKU_APP: truck-buddy
  PRODUCTION_API: https://truck-buddy-f14f250ae8b3.herokuapp.com/api
  POLL_SECONDS: 30
  TIMEOUT_MINUTES: 20

jobs:
  verify:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write

    steps:
      - name: Require Heroku API key
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          if [ -z "$HEROKU_API_KEY" ]; then
            echo "::error::HEROKU_API_KEY secret is not set. Add it in GitHub → Settings → Secrets → Actions."
            echo "Create at: https://dashboard.heroku.com/account/applications/authorizations"
            exit 1
          fi

      - name: Wait for Heroku build and verify production
        id: verify
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + TIMEOUT_MINUTES * 60 ))
          build_status=""
          release_version=""

          echo "Waiting for Heroku app ${HEROKU_APP} to deploy commit ${COMMIT_SHA:0:7}..."

          while [ "$(date +%s)" -lt "$deadline" ]; do
            builds=$(curl -fsS \
              -H "Authorization: Bearer ${HEROKU_API_KEY}" \
              -H "Accept: application/vnd.heroku+json; version=3" \
              "https://api.heroku.com/apps/${HEROKU_APP}/builds")

            build_status=$(echo "$builds" | jq -r --arg sha "$COMMIT_SHA" \
              '[.[] | select(.source_blob.version == $sha)] | .[0].status // empty')
            build_id=$(echo "$builds" | jq -r --arg sha "$COMMIT_SHA" \
              '[.[] | select(.source_blob.version == $sha)] | .[0].id // empty')

            if [ "$build_status" = "failed" ]; then
              echo "result=failed" >> "$GITHUB_OUTPUT"
              echo "detail=Heroku build failed for ${COMMIT_SHA:0:7} (build ${build_id})" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if [ "$build_status" = "succeeded" ]; then
              releases=$(curl -fsS \
                -H "Authorization: Bearer ${HEROKU_API_KEY}" \
                -H "Accept: application/vnd.heroku+json; version=3" \
                "https://api.heroku.com/apps/${HEROKU_APP}/releases")
              release_version=$(echo "$releases" | jq -r '.[0].version // empty')
              echo "Build succeeded; latest release v${release_version}"
              break
            fi

            echo "No completed build yet (status=${build_status:-pending}) — retry in ${POLL_SECONDS}s"
            sleep "$POLL_SECONDS"
          done

          if [ "$build_status" != "succeeded" ]; then
            echo "result=timeout" >> "$GITHUB_OUTPUT"
            echo "detail=No successful Heroku build for ${COMMIT_SHA:0:7} within ${TIMEOUT_MINUTES} minutes" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          health_code=$(curl -s -o /dev/null -w "%{http_code}" "${PRODUCTION_API}/health/" || true)
          if [ "$health_code" != "200" ]; then
            echo "result=smoke_failed" >> "$GITHUB_OUTPUT"
            echo "detail=Deploy built but GET /api/health/ returned HTTP ${health_code}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "result=success" >> "$GITHUB_OUTPUT"
          echo "detail=Heroku v${release_version} live; /api/health/ returned 200" >> "$GITHUB_OUTPUT"

      - name: Set commit status
        if: always()
        uses: actions/github-script@v7
        env:
          VERIFY_RESULT: ${{ steps.verify.outputs.result }}
          VERIFY_DETAIL: ${{ steps.verify.outputs.detail }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          script: |
            const result = process.env.VERIFY_RESULT || 'failed';
            const detail = process.env.VERIFY_DETAIL || 'Deploy verification did not complete';
            const sha = process.env.COMMIT_SHA;
            const state = result === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state,
              context: 'deploy/heroku-production',
              description: detail.slice(0, 140),
              target_url: 'https://dashboard.heroku.com/apps/truck-buddy/activity',
            });

      - name: Notify webhook (optional)
        if: always() && secrets.DEPLOY_NOTIFY_WEBHOOK_URL != ''
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
          VERIFY_RESULT: ${{ steps.verify.outputs.result }}
          VERIFY_DETAIL: ${{ steps.verify.outputs.detail }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          emoji="✅"
          title="Backend deploy verified"
          if [ "$VERIFY_RESULT" != "success" ]; then
            emoji="❌"
            title="Backend deploy FAILED"
          fi
          payload=$(jq -n \
            --arg text "${emoji} ${title}: \`${COMMIT_SHA:0:7}\` — ${VERIFY_DETAIL}" \
            '{text: $text}')
          curl -fsS -X POST -H "Content-Type: application/json" -d "$payload" "$WEBHOOK_URL"

      - name: Fail if deploy not verified
        if: steps.verify.outputs.result != 'success'
        run: |
          echo "::error::${{ steps.verify.outputs.detail }}"
          echo "Manual deploy: Heroku Dashboard → Deploy → main, or \`git push heroku main\`"
          exit 1

  ci-failed-notify:
    if: >-
      github.event.workflow_run.conclusion != 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy blocked by CI
        env:
          WEBHOOK_URL: ${{ secrets.DEPLOY_NOTIFY_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          msg="⚠️ Backend deploy blocked: CI ${CONCLUSION} on \`${COMMIT_SHA:0:7}\`. Heroku auto-deploy will not run until CI is green."
          echo "$msg"
          if [ -n "$WEBHOOK_URL" ]; then
            curl -fsS -X POST -H "Content-Type: application/json" \
              -d "$(jq -n --arg text "$msg" '{text: $text}')" "$WEBHOOK_URL" || true
          fi
